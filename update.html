<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>口腔衛生学アプリ 強制更新</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#eef6f2;color:#17342b;margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;box-sizing:border-box}.card{width:min(620px,100%);background:#fff;border:1px solid #cfe1d9;border-radius:24px;padding:28px;box-shadow:0 18px 50px rgba(22,80,60,.12)}h1{margin:0 0 12px;color:#087451;font-size:1.7rem}p{line-height:1.75}.status{background:#e3f5ed;border-radius:14px;padding:14px;margin:18px 0;font-weight:700}button{width:100%;border:0;border-radius:14px;padding:16px;background:#087451;color:#fff;font-size:1.05rem;font-weight:800}.small{font-size:.84rem;color:#60756d}code{overflow-wrap:anywhere}
</style>
</head>
<body><main class="card"><h1>アプリをv8へ強制更新</h1><p>古いアプリのキャッシュだけを削除します。<strong>学習記録・編集した問題・追加画像の保存データは削除しません。</strong></p><div class="status" id="status">更新準備中…</div><button id="run">更新を実行する</button><p class="small">処理後、自動的に <code>index.html?v=8.0.0</code> を開きます。</p></main>
<script>
async function run(){
 const status=document.getElementById('status'); const button=document.getElementById('run');
 button.disabled=true; status.textContent='古いキャッシュを削除しています…';
 try{
   if('serviceWorker' in navigator){
     const regs=await navigator.serviceWorker.getRegistrations();
     await Promise.all(regs.map(r=>r.unregister()));
   }
   if('caches' in window){
     const names=await caches.keys();
     await Promise.all(names.map(n=>caches.delete(n)));
   }
   status.textContent='完了しました。v8を開きます…';
   setTimeout(()=>location.replace('./index.html?v=8.0.0&forced='+Date.now()),600);
 }catch(e){
   status.textContent='更新処理でエラーが出ました。もう一度押してください。';
   button.disabled=false;
 }
}
document.getElementById('run').addEventListener('click',run);
setTimeout(run,500);
</script></body></html>
