<!doctype html><html lang='ja'><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>口腔衛生学 v9 更新</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f2f6f4;color:#17211c;margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}.card{max-width:560px;background:white;border:1px solid #d7e3dd;border-radius:20px;padding:26px;box-shadow:0 10px 36px #14382a18}h1{font-size:1.45rem}button{width:100%;min-height:52px;border:0;border-radius:12px;background:#16795a;color:white;font-size:1rem;font-weight:800}.status{margin-top:15px;color:#637169}</style><div class='card'><h1>口腔衛生学アプリ v9へ更新</h1><p>学習記録と編集内容は消さず、古いアプリキャッシュだけを削除します。</p><button id='go'>更新を開始</button><p id='status' class='status'></p></div><script>document.getElementById('go').onclick=async()=>{const s=document.getElementById('status');s.textContent='古いキャッシュを削除しています…';try{if('serviceWorker'in navigator){const rs=await navigator.serviceWorker.getRegistrations();await Promise.all(rs.map(r=>r.unregister()))}if('caches'in window){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)))}s.textContent='v9を開きます。容量修復の案内が出たらボタンを押してください。';setTimeout(()=>location.replace('./index.html?v=9.0.0&t='+Date.now()),700)}catch(e){s.textContent='更新に失敗しました。Safariで再読み込みしてください。'}}</script></html>
